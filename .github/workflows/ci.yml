name: CI
on:
  push:
    branches:
      - master
      - "fix/**"
      - "release/**"
      - "chore/**"
      - "feature/**"
      - "hotfix/**"
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.props"
      - "**.slnx"
      - "**.targets"
      - "**/.editorconfig"
      - ".config/dotnet-tools.json"
      - ".editorconfig"
      - ".github/workflows/ci.yml"
      - "global.json"
      - "Makefile"
      - "nuget.config"
  pull_request:
    branches: [master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.props"
      - "**.slnx"
      - "**.targets"
      - "**/.editorconfig"
      - ".config/dotnet-tools.json"
      - ".editorconfig"
      - ".github/workflows/ci.yml"
      - "global.json"
      - "Makefile"
      - "nuget.config"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - name: Install dependencies
        run: make install
      - name: Lint and build
        run: make lint CONFIGURATION=Release
      - name: Test with coverage
        run: make coverage CONFIGURATION=Release
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/GbcNet.Tests/bin/Release/net10.0/TestResults/coverage.cobertura.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
